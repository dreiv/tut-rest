<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>400 Bad Request - Validation Failed</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 500px;
        margin: 40px auto;
        padding: 0 20px;
        color: #333;
        line-height: 1.5;
      }
      h1 {
        color: #dd6b20;
        border-bottom: 2px solid #feebc8;
        padding-bottom: 8px;
      }
      code {
        background: #edf2f7;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Validation Failed</h1>
      <p>
        The request payload or parameter format failed syntactic type
        constraints.
      </p>
      <h2>Resolution:</h2>
      <p>
        Inspect the <code>invalidParams</code> property array inside the
        returned JSON error object to trace which attributes violate schema
        parameters.
      </p>
    </main>
  </body>
</html>
