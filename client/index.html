<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tut-REST Client</title>
  </head>
  <body>
    <div id="app">
      <h1 class="title">Tut-REST Messages</h1>

      <div id="status-container"></div>

      <section class="form-section">
        <h2>Add New Message</h2>
        <form id="message-form">
          <input
            type="text"
            id="new-message-text"
            placeholder="Enter message text..."
            required
          />
          <button type="submit" id="add-btn">Add Message</button>
        </form>
      </section>

      <hr />

      <ul id="message-list"></ul>
    </div>

    <!-- Edit Message Dialog Modal -->
    <dialog id="edit-dialog">
      <form method="dialog" id="edit-dialog-form">
        <h3>Edit Message</h3>
        <input type="text" id="edit-message-text" required />
        <div
          style="
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
          "
        >
          <button
            type="button"
            id="cancel-edit-btn"
            style="background-color: var(--gray)"
          >
            Cancel
          </button>
          <button type="submit">Save Changes</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
