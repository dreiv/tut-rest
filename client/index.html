<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tut-REST Client</title>
  </head>
  <body>
    <div id="app">
      <h1 class="title">Tut-REST Messages</h1>

      <div id="status-container"></div>

      <section class="form-section">
        <h2>Add New Message</h2>
        <form id="message-form">
          <input
            type="text"
            id="new-message-text"
            placeholder="Enter message text..."
            required
          />
          <button type="submit" id="add-btn">Add Message</button>
        </form>
      </section>

      <section class="form-section">
        <h2>Filters & Sorting Options</h2>
        <form id="filter-form">
          <div class="filter-grid">
            <input
              type="text"
              id="search-input"
              placeholder="Search message text..."
            />

            <select id="category-filter">
              <option value="">All Categories</option>
              <option value="user">User</option>
              <option value="system">System</option>
              <option value="billing">Billing</option>
            </select>

            <select id="priority-filter">
              <option value="">All Priorities</option>
              <option value="1">Priority 1 (Lowest)</option>
              <option value="2">Priority 2</option>
              <option value="3">Priority 3</option>
              <option value="4">Priority 4</option>
              <option value="5">Priority 5 (Highest)</option>
            </select>

            <select id="sort-by">
              <option value="createdAt">Sort by Date</option>
              <option value="priority">Sort by Priority</option>
            </select>

            <select id="sort-order">
              <option value="desc">Descending</option>
              <option value="asc">Ascending</option>
            </select>

            <button type="submit" id="filter-btn">Apply Filters</button>
          </div>
        </form>
      </section>

      <hr />

      <ul id="message-list"></ul>

      <div id="pagination-container" class="pagination-layout">
        <button id="prev-page-btn" disabled>◀ Previous</button>
        <span id="page-indicator">Page 1 of 1</span>
        <button id="next-page-btn" disabled>Next ▶</button>
      </div>
    </div>

    <dialog id="edit-dialog">
      <form method="dialog" id="edit-dialog-form">
        <h3>Edit Message</h3>
        <input type="text" id="edit-message-text" required />
        <div
          style="
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
          "
        >
          <button
            type="button"
            id="cancel-edit-btn"
            style="background-color: var(--gray)"
          >
            Cancel
          </button>
          <button type="submit">Save Changes</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
